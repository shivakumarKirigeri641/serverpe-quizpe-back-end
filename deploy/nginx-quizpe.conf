# ---------------------------------------------------------------------------
# QuizPe — Nginx for three hosts on one box.
#
#   quizpe.in        static  marketing site
#   admin.quizpe.in  static  admin panel
#   api.quizpe.in    proxy   Node on 127.0.0.1:5008
#
# Install:
#   sudo cp nginx-quizpe.conf /etc/nginx/sites-available/quizpe
#   sudo ln -s /etc/nginx/sites-available/quizpe /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then add TLS — certbot rewrites these blocks and adds the 443 servers:
#   sudo certbot --nginx -d quizpe.in -d www.quizpe.in -d admin.quizpe.in -d api.quizpe.in
#
# Run certbot only AFTER all four DNS A records point at this server.
# ---------------------------------------------------------------------------

# --- public marketing site -------------------------------------------------
server {
    listen 80;
    server_name quizpe.in www.quizpe.in;
    root /var/www/quizpe-site;
    index index.html;

    # Single-page app: unknown paths render the app, not a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed filenames, so they can be cached hard and for a long time.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html must never be cached, or a deploy leaves visitors on the old
    # bundle pointing at asset filenames that no longer exist.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}

# --- admin panel -----------------------------------------------------------
server {
    listen 80;
    server_name admin.quizpe.in;
    root /var/www/quizpe-admin;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # The panel shows children's and financial data — keep it out of search
    # results and out of any embedding page.
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header X-Frame-Options "DENY" always;
}

# --- API + the pages WhatsApp links to -------------------------------------
server {
    listen 80;
    server_name api.quizpe.in;

    # PDF reports; the largest thing this server sends.
    client_max_body_size 12m;

    location / {
        proxy_pass http://127.0.0.1:5008;
        proxy_http_version 1.1;

        # The Node app sets trust proxy, so these headers decide what it sees
        # as the client IP. Rate limiting is only correct if they are right.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Report generation and Meta calls can be slow; the default 60s read
        # timeout cuts them off mid-PDF.
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    # Meta retries aggressively and must never be throttled or buffered.
    location /serverpe/platform/quizpe/v1/public/users/whatsapp/webhook {
        proxy_pass http://127.0.0.1:5008;
        proxy_http_version 1.1;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
    }

    add_header X-Robots-Tag "noindex, nofollow" always;
}
